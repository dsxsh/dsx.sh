<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#06101d">
  <title>dsx.sh</title>
  <meta name="description" content="Dylan Shepard — building fun things on the internet.">
  <!-- Shantell Sans: project initiated by Shantell Martin; font design/development by ArrowType / Stephen Nixon. Licensed under the SIL OFL 1.1; see assets/fonts/ShantellSans-OFL.txt. -->
  <style>
    @font-face {
      font-family: 'Shantell Sans';
      src: url('/assets/fonts/ShantellSans[BNCE,INFM,SPAC,ital,wght].woff2') format('woff2-variations');
      font-weight: 300 800;
      font-style: normal italic;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --abyss: #06101d;
      --deep: #081827;
      --glass: rgba(9, 30, 48, 0.68);
      --line: rgba(142, 207, 230, 0.18);
      --mist: #d9f5ff;
      --soft: #9bc3d2;
      --dim: #7da4b3;
      --glow: #73dcff;
      --foam: #b6f3ff;
      --font: 'Shantell Sans', system-ui, sans-serif;
    }

    html {
      min-height: 100%;
      background: var(--abyss);
      color: var(--soft);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      padding: 3rem 1.5rem;
      background:
        radial-gradient(circle at 50% 18%, rgba(61, 159, 203, 0.13), transparent 32rem),
        linear-gradient(155deg, #071421 0%, var(--abyss) 58%, #040b14 100%);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.28'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    .shell {
      position: relative;
      width: min(100%, 780px);
      animation: surface 800ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .moonpool {
      position: absolute;
      z-index: -1;
      top: -9rem;
      right: -5rem;
      width: 22rem;
      aspect-ratio: 1;
      border-radius: 48% 52% 54% 46% / 57% 43% 57% 43%;
      background:
        radial-gradient(circle at 38% 35%, rgba(222, 250, 255, 0.92) 0 2%, transparent 10%),
        radial-gradient(circle at 42% 42%, #78ddf7 0 9%, #2d8db5 25%, rgba(17, 83, 118, 0.32) 51%, transparent 69%);
      filter: blur(1px) drop-shadow(0 0 4rem rgba(66, 183, 226, 0.28));
      opacity: 0.82;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .moonpool::after {
      content: '';
      position: absolute;
      inset: 15%;
      border: 1px solid rgba(216, 249, 255, 0.2);
      border-radius: 58% 42% 47% 53%;
      transform: rotate(18deg);
    }

    .card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(17rem, .9fr);
      border: 1px solid var(--line);
      border-radius: 1.4rem .45rem 1.4rem .45rem;
      background: linear-gradient(145deg, rgba(11, 34, 53, 0.78), rgba(5, 18, 31, 0.84));
      box-shadow: 0 1.8rem 6rem rgba(0, 5, 12, 0.5), inset 0 1px rgba(224, 249, 255, 0.05);
      backdrop-filter: blur(18px);
    }

    .intro { padding: 3.25rem 3rem 2.75rem; }

    .signal {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      margin-bottom: 2.5rem;
      color: var(--dim);
      font-family: var(--font);
      font-size: .7rem;
      line-height: 1;
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .signal::before {
      content: '';
      width: .45rem;
      height: .45rem;
      border-radius: 50%;
      background: var(--glow);
      box-shadow: 0 0 1rem var(--glow);
    }

    h1 {
      max-width: 8ch;
      color: var(--mist);
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      font-variation-settings: 'wght' 440, 'INFM' 80, 'SPAC' 10;
      letter-spacing: -.065em;
      line-height: .88;
    }

    .tagline {
      max-width: 24rem;
      margin-top: 1.6rem;
      color: var(--soft);
      font-size: 1rem;
      font-variation-settings: 'wght' 390, 'INFM' 55;
    }

    .tagline strong {
      color: var(--foam);
      font-weight: 470;
    }

    .links {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 1rem;
      border-left: 1px solid var(--line);
      background: rgba(4, 17, 29, 0.25);
    }

    .links a {
      display: grid;
      grid-template-columns: 3.5rem 1fr auto;
      align-items: center;
      gap: .8rem;
      min-height: 3.35rem;
      padding: .7rem .85rem;
      border-radius: .75rem .2rem .75rem .2rem;
      color: var(--soft);
      text-decoration: none;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .links a::after { content: '↗'; color: var(--dim); font-family: var(--font); font-size: .9rem; }
    .links a:hover { color: var(--mist); background: rgba(115, 220, 255, 0.07); transform: translateX(.2rem); }
    .links a:hover::after { color: var(--glow); }
    .links a:focus-visible { outline: 2px solid var(--glow); outline-offset: 1px; }

    .link-label {
      color: var(--dim);
      font-family: var(--font);
      font-size: .65rem;
      line-height: 1;
      letter-spacing: .08em;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem .3rem 0;
      color: var(--dim);
      font-family: var(--font);
      font-size: .72rem;
      line-height: 1.5;
      letter-spacing: .02em;
    }

    .did { color: inherit; text-decoration: none; transition: color 180ms ease; }
    .did:hover { color: var(--soft); }

    @keyframes surface {
      from { opacity: 0; transform: translateY(1rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift {
      to { transform: translate(-1.4rem, 1rem) rotate(8deg) scale(1.04); }
    }

    @media (max-width: 650px) {
      body { place-items: start center; padding: 5rem 1rem 2rem; }
      .moonpool { width: 17rem; top: -7rem; right: -4rem; }
      .card { grid-template-columns: 1fr; }
      .intro { padding: 2.7rem 2rem 2.2rem; }
      .signal { margin-bottom: 2rem; }
      .links { border-top: 1px solid var(--line); border-left: 0; padding: .75rem; }
      footer { flex-direction: column; padding-inline: .2rem; }
      .did { overflow-wrap: anywhere; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="moonpool" aria-hidden="true"></div>
    <main class="card">
      <section class="intro" aria-labelledby="name">
        <div class="signal">transmitting from dsx.sh</div>
        <h1 id="name">Dylan Shepard</h1>
        <p class="tagline">Building <strong>small, strange things</strong> for fun on the internet.</p>
      </section>

      <nav class="links" aria-label="Elsewhere on the internet">
        <a href="https://tangled.org/dsx.sh" rel="me noopener"><span class="link-label">BSKY</span><span>@dsx.sh</span></a>
        <a href="https://dragonfruit.dev" rel="noopener"><span class="link-label">BLOG</span><span>dragonfruit.dev</span></a>
        <a href="https://shepard.dev" rel="noopener"><span class="link-label">SITE</span><span>shepard.dev</span></a>
        <a href="https://github.com/ryphon" rel="me noopener"><span class="link-label">GH</span><span>github.com/ryphon</span></a>
        <a href="https://git.dragonfruit.dev" rel="noopener"><span class="link-label">GIT</span><span>git.dragonfruit.dev</span></a>
        <a href="https://cleo.wisp.place" rel="noopener"><span class="link-label">CLEO</span><span>cleo.wisp.place</span></a>
      </nav>
    </main>

    <footer>
      <span>personal signal / northern hemisphere</span>
      <a class="did" href="https://pdsls.dev/at://did:plc:6so2rykrnjmzebbr2zbwbqbx" rel="me noopener">did:plc:6so2rykrnjmzebbr2zbwbqbx</a>
    </footer>
  </div>
</body>
</html>
